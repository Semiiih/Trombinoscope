services:
  postgres:
    container_name: trombi_postgres
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data/db-files/
    environment:
      POSTGRES_USER: trombi
      POSTGRES_PASSWORD: trombi_secret
      POSTGRES_DB: trombinoscope
      PGDATA: /var/lib/postgresql/data/db-files/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trombi -d trombinoscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: trombi_minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/trombi-uploads &&
        mc anonymous set download local/trombi-uploads
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trombi_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://trombi:trombi_secret@postgres:5432/trombinoscope
      UPLOAD_DIR: /app/uploads
      STORAGE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: trombi-uploads
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    command: >
      sh -c "npx prisma db push --accept-data-loss && node src/server.js"

  adminer:
    container_name: trombi_adminer
    image: michalhosna/adminer
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      ADMINER_DRIVER: pgsql
      ADMINER_SERVER: postgres
      ADMINER_DB: trombinoscope
      ADMINER_USERNAME: trombi
      ADMINER_PASSWORD: trombi_secret
      ADMINER_AUTOLOGIN: 1
      ADMINER_NAME: Trombinoscope - local
    depends_on:
      - postgres

volumes:
  db-data:
  uploads_data:
  exports_data:
  minio_data:
